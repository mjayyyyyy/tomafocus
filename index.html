<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TomaFocus — Aesthetic Focus Timer</title>
  <meta name="description" content="A beautiful, minimalist focus timer to boost your productivity.">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2D2D2D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TomaFocus">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pomo-bg: #2D2D2D; --pomo-dark: #1A1A1A; --pomo-hover: #3D3D3D;
      --short-bg: #1E3A2F; --short-dark: #142A21; --short-hover: #2A4E3F;
      --long-bg: #1E2A3A; --long-dark: #141E2A; --long-hover: #2A3A4E;
      --active-bg: var(--pomo-bg); --active-dark: var(--pomo-dark); --active-hover: var(--pomo-hover);
      --card-bg: rgba(255,255,255,0.02);
      --btn-bg: #E0E0E0; --btn-text: #121212;
      --text: #B0B0B0; --text-sec: #707070;
      --task-bg: #181818; --task-text: #E0E0E0;
      --accent: #81E6D9;
      --font: 'Outfit', sans-serif;
      --timer-font: 'Space Mono', monospace;
      --radius: 16px;
      --bg-base: #121212;
    }

    body {
      font-family: var(--font);
      background-color: var(--active-bg);
      color: #FFFFFF;
      min-height: 100vh;
      transition: background-color 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      overflow-x: hidden;
      position: relative;
    }

    body.layout-minimal {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    /* ── Progress Bar ── */
    .progress-bar-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 4px;
      background: rgba(255,255,255,0.15); z-index: 100;
      display: none;
    }
    body.layout-minimal .progress-bar-container {
      display: block;
      height: 5px;
    }
    .progress-bar {
      height: 100%; width: 0%; background: #FFFFFF;
      transition: width 0.2s linear;
    }

    /* ── Shifting Background Gradient (Zen mode) ── */
    .bg-gradient {
      display: none;
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
    }
    body.layout-minimal .bg-gradient {
      display: block;
      background: linear-gradient(
        -45deg,
        rgba(255, 255, 255, 0.05),
        rgba(0, 0, 0, 0.12),
        rgba(255, 255, 255, 0.08),
        rgba(0, 0, 0, 0.08),
        rgba(255, 255, 255, 0.05)
      );
      background-size: 400% 400%;
      animation: ambientShift 30s ease infinite;
      transition: opacity 0.6s ease;
    }
    @keyframes ambientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    body.layout-minimal.timer-running .bg-gradient {
      animation-duration: 12s;
      background: linear-gradient(
        -45deg,
        rgba(255, 255, 255, 0.08),
        rgba(0, 0, 0, 0.18),
        rgba(255, 255, 255, 0.12),
        rgba(0, 0, 0, 0.12),
        rgba(255, 255, 255, 0.08)
      );
      background-size: 300% 300%;
    }

    /* ── Header ── */
    .header {
      max-width: 640px; margin: 0 auto; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      transition: all 0.3s ease;
    }
    body.layout-minimal .header {
      max-width: 600px; width: 100%; margin: 0 auto; padding: 24px 24px 10px;
      border-bottom: none;
    }
    .header__logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; cursor: default;
      transition: all 0.3s ease;
      user-select: none;
    }
    body.layout-minimal .header__logo {
      font-size: 1.5rem; opacity: 0.45;
    }
    body.layout-minimal .header__logo:hover {
      opacity: 0.95;
      transform: scale(1.1);
    }
    .header__actions { display: flex; gap: 8px; align-items: center; }

    .btn-icon {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 13px; border: none; border-radius: 8px;
      background: rgba(255,255,255,0.2); color: #fff;
      font-family: var(--font); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.3); }
    .btn-icon:active { transform: scale(0.96); }
    .btn-icon svg { width: 15px; height: 15px; }

    body.layout-minimal .btn-icon {
      background: transparent;
      padding: 0;
      opacity: 0.8;
      font-size: 0.85rem;
    }
    body.layout-minimal .btn-icon:hover { background: transparent; opacity: 1; }
    body.layout-minimal .btn-icon svg { width: 22px; height: 22px; }

    /* ── Container ── */
    .container { max-width: 520px; margin: 0 auto; padding: 0 20px; transition: max-width 0.3s ease; }
    body.layout-minimal .container { max-width: 540px; padding: 0 24px; }

    /* ── Timer Card ── */
    .timer-card {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 22px 0 30px; margin-top: 26px; text-align: center;
      backdrop-filter: blur(4px);
      transition: all 0.3s ease;
    }
    body.layout-minimal .timer-card {
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
      padding: 0;
      margin-top: clamp(40px, 8vh, 80px);
    }

    .mode-tabs { display: flex; justify-content: center; gap: clamp(2px, 1vw, 6px); margin-bottom: 22px; transition: all 0.3s ease; }
    body.layout-minimal .mode-tabs { gap: clamp(12px, 8vw - 12px, 28px); margin-bottom: clamp(20px, 6vh, 35px); }

    .mode-tab {
      padding: 5px clamp(8px, 3vw - 2px, 14px); border: none; border-radius: 8px;
      background: transparent; color: #fff; font-family: var(--font);
      font-size: clamp(0.8rem, 1vw + 0.6rem, 0.93rem); font-weight: 500; cursor: pointer; transition: all 0.25s;
    }
    .mode-tab:hover { background: rgba(255,255,255,0.1); }
    .mode-tab.active { background: rgba(0,0,0,0.15); font-weight: 600; }

    body.layout-minimal .mode-tab {
      color: rgba(255,255,255,0.6);
      font-size: clamp(0.95rem, 2vw + 0.7rem, 1.15rem);
      padding: 6px 0;
      border-radius: 0;
    }
    body.layout-minimal .mode-tab:hover { background: transparent; color: #FFFFFF; opacity: 1; }
    body.layout-minimal .mode-tab.active {
      background: transparent;
      color: #FFFFFF;
      font-weight: 600;
      position: relative;
    }
    body.layout-minimal .mode-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
      background: #FFFFFF; animation: tabLine 0.25s ease-out;
    }
    @keyframes tabLine { from { width:0; } to { width:100%; } }

    body.layout-minimal .tab-extra {
      display: none;
    }

    .timer-display {
      font-family: var(--timer-font); font-size: clamp(4.5rem, 20vw + 8px, 7rem); font-weight: 700;
      letter-spacing: clamp(1px, 0.8vw, 4px); line-height: 1; margin: 6px 0 26px;
      user-select: none; text-shadow: 0 2px 10px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
    }
    body.layout-minimal .timer-display {
      font-size: clamp(5.5rem, 40vw - 40px, 11rem); font-weight: 400;
      letter-spacing: clamp(-6px, -1vw, -3px); line-height: 0.9; margin: 15px 0 35px;
      text-shadow: none;
    }

    .start-btn {
      padding: 13px clamp(30px, 10vw - 2px, 50px); border: none; border-radius: 12px;
      background: var(--btn-bg); color: var(--btn-text);
      font-family: var(--font); font-size: clamp(1.1rem, 2vw + 0.7rem, 1.3rem); font-weight: 700;
      letter-spacing: clamp(2px, 1vw, 4px); text-transform: uppercase; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15);
      transition: color 0.5s, background 0.5s, transform 0.1s, box-shadow 0.1s, border-radius 0.3s;
      position: relative; top: 0;
    }
    .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }

    body.layout-minimal .start-btn {
      padding: 15px clamp(40px, 18vw - 18px, 80px); border: 3px solid #FFFFFF; border-radius: 50px;
      background: transparent; color: #FFFFFF;
      font-size: clamp(1.1rem, 2vw + 0.7rem, 1.35rem); letter-spacing: clamp(3px, 1.5vw, 6px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      top: auto;
    }
    body.layout-minimal .start-btn:hover {
      background: #FFFFFF; color: var(--active-bg) !important;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }
    body.layout-minimal .start-btn:active {
      transform: translateY(0) scale(0.97);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    /* ── Session Info & Counter ── */
    .session-info { text-align: center; margin: 24px 0 6px; font-size: 0.93rem; font-weight: 500; opacity: 0.9; }
    .session-counter {
      color: rgba(255,255,255,0.6); font-size: 0.83rem; text-align: center; margin-bottom: 22px;
      transition: all 0.3s ease;
    }
    body.layout-minimal .session-counter {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 40px;
      letter-spacing: 2px;
      font-family: var(--timer-font);
    }

    /* ── Tasks ── */
    .tasks-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 0 12px; border-bottom: 2px solid rgba(255,255,255,0.5); margin-bottom: 8px;
      transition: all 0.3s ease;
    }
    body.layout-minimal .tasks-header {
      padding: 14px 0; border-bottom: 1.5px solid rgba(255,255,255,0.2); margin-bottom: 16px;
    }
    .tasks-header__title { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.3px; transition: all 0.3s ease; }
    body.layout-minimal .tasks-header__title { font-size: 1.05rem; letter-spacing: 1px; text-transform: uppercase; opacity: 0.85; }

    .tasks-hdr-btn {
      width: 30px; height: 30px; border: none; border-radius: 8px;
      background: rgba(255,255,255,0.15); color: #fff; font-size: 0.95rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .tasks-hdr-btn:hover { background: rgba(255,255,255,0.25); }

    body.layout-minimal .tasks-hdr-btn {
      width: auto; height: auto; background: transparent; color: rgba(255,255,255,0.7); font-size: 0.9rem;
      opacity: 0.8;
    }
    body.layout-minimal .tasks-hdr-btn:hover { background: transparent; opacity: 1; }

    .task-list { list-style: none; margin-bottom: 10px; }
    body.layout-minimal .task-list { margin-bottom: 16px; }

    .task-item {
      background: var(--task-bg); border-radius: var(--radius);
      padding: 14px 16px; margin-top: 8px; display: flex; align-items: center; gap: 12px;
      color: var(--task-text); cursor: pointer;
      border-left: 6px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.3s, background 0.2s;
    }
    .task-item.active-task { border-left-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .task-item.completed { opacity: 0.5; }
    .task-item.completed .task-name { text-decoration: line-through; }

    body.layout-minimal .task-item {
      background: rgba(255,255,255,0.07); border-radius: 14px;
      padding: 16px 20px; margin-top: 10px; gap: 14px;
      color: #FFFFFF;
      border: 1px solid rgba(255,255,255,0.05);
      border-left: 1px solid rgba(255,255,255,0.05);
      box-shadow: none;
    }
    body.layout-minimal .task-item:hover { background: rgba(255,255,255,0.13); }
    body.layout-minimal .task-item.active-task { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.6); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    body.layout-minimal .task-item.completed { opacity: 0.4; }

    .task-check {
      width: 26px; height: 26px; border-radius: 50%; border: 2px solid #ddd;
      background: transparent; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all 0.2s;
      font-size: 0.8rem; color: transparent;
    }
    .task-check:hover { border-color: #2ECC71; background: rgba(46,204,113,0.1); }
    .task-item.completed .task-check { border-color: #2ECC71; background: #2ECC71; color: #fff; }

    body.layout-minimal .task-check {
      border-radius: 7px; border: 2px solid rgba(255,255,255,0.4);
    }
    body.layout-minimal .task-check:hover { border-color: #FFFFFF; background: rgba(255,255,255,0.1); }
    body.layout-minimal .task-item.completed .task-check { border-color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.9); color: var(--active-bg); }

    .task-content { flex: 1; min-width: 0; }
    .task-name { font-size: 0.95rem; font-weight: 500; }
    body.layout-minimal .task-name { font-size: 1.05rem; letter-spacing: 0.2px; }

    .task-pomos { font-size: 0.8rem; color: var(--text-sec); margin-top: 2px; }
    body.layout-minimal .task-pomos { font-size: 0.85rem; color: rgba(255,255,255,0.65); margin-top: 3px; font-family: var(--timer-font); }

    .task-del {
      width: 26px; height: 26px; border: none; border-radius: 6px;
      background: transparent; color: #ccc; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: all 0.2s;
    }
    .task-item:hover .task-del { opacity: 1; }
    .task-del:hover { background: rgba(231,76,60,0.1); color: #E74C3C; }

    body.layout-minimal .task-del {
      width: 24px; height: 24px; border-radius: 0; background: transparent; color: rgba(255,255,255,0.5); font-size: 0.95rem;
      opacity: 0;
    }
    body.layout-minimal .task-item:hover .task-del { opacity: 0.7; }
    body.layout-minimal .task-del:hover { background: transparent; opacity: 1 !important; color: #FF8F8F; }

    .add-btn {
      width: 100%; padding: 14px; margin-top: 10px;
      border: 2px dashed rgba(255,255,255,0.35); border-radius: var(--radius);
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.65);
      font-family: var(--font); font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .add-btn:hover { border-color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.1); color: #fff; }

    body.layout-minimal .add-btn {
      border: 1px dashed rgba(255,255,255,0.25); border-radius: 14px;
      background: transparent; color: rgba(255,255,255,0.75);
    }
    body.layout-minimal .add-btn:hover { border-color: #FFFFFF; color: #FFFFFF; background: rgba(255,255,255,0.08); }

    .add-form {
      background: var(--task-bg); border-radius: var(--radius); margin-top: 10px;
      overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,0.12);
      display: none; color: var(--task-text);
      transition: background 0.3s, color 0.3s;
    }
    .add-form.visible { display: block; animation: slideIn 0.22s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    body.layout-minimal .add-form {
      background: rgba(255,255,255,0.08); border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      color: #FFFFFF;
      box-shadow: none;
    }

    .add-form__body { padding: 18px 18px 14px; }
    .add-form__input {
      width: 100%; padding: 9px 0; border: none; border-bottom: 2px solid #eee;
      font-family: var(--font); font-size: 1.05rem; font-weight: 600;
      color: var(--task-text); outline: none; background: transparent; transition: border-color 0.2s;
    }
    .add-form__input::placeholder { color: #ccc; font-weight: 400; }
    .add-form__input:focus { border-bottom-color: var(--accent); }

    body.layout-minimal .add-form__input {
      color: #FFFFFF; border-bottom-color: rgba(255,255,255,0.15);
    }
    body.layout-minimal .add-form__input::placeholder { color: rgba(255,255,255,0.4); }
    body.layout-minimal .add-form__input:focus { border-bottom-color: #FFFFFF; }

    .add-form__row { display: flex; align-items: center; gap: 10px; margin-top: 14px; justify-content: space-between; }
    body.layout-minimal .add-form__row { margin-top: 16px; }

    .add-form__label { font-size: 0.83rem; font-weight: 600; color: var(--text-sec); }
    body.layout-minimal .add-form__label { font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.65); }

    .stepper { display: flex; align-items: center; gap: 7px; }
    .stepper-btn {
      width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 6px;
      background: #f5f5f5; color: var(--text); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .stepper-btn:hover { background: #e8e8e8; }
    .stepper-val { font-size: 0.95rem; font-weight: 600; min-width: 18px; text-align: center; }

    body.layout-minimal .stepper-btn {
      border: 1.5px solid rgba(255,255,255,0.25); border-radius: 7px;
      background: transparent; color: #FFFFFF;
    }
    body.layout-minimal .stepper-btn:hover { background: rgba(255,255,255,0.08); border-color: #FFFFFF; }
    body.layout-minimal .stepper-val { color: #FFFFFF; font-family: var(--timer-font); min-width: 20px; }

    .add-form__footer {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 10px 18px; background: rgba(128,128,128,0.05); border-top: 1px solid rgba(128,128,128,0.1);
    }
    body.layout-minimal .add-form__footer {
      background: transparent; border-top-color: rgba(255,255,255,0.15);
    }

    .form-btn {
      padding: 9px 18px; border: none; border-radius: 6px;
      font-family: var(--font); font-size: 0.87rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .form-btn--cancel { background: transparent; color: var(--text-sec); }
    .form-btn--cancel:hover { color: var(--text); }
    .form-btn--save { background: var(--accent); color: #fff; }
    .form-btn--save:hover { opacity: 0.9; }

    body.layout-minimal .form-btn { font-size: 0.8rem; border-radius: 4px; padding: 6px 14px; }
    body.layout-minimal .form-btn--cancel { color: rgba(255,255,255,0.7); }
    body.layout-minimal .form-btn--cancel:hover { color: #FFFFFF; }
    body.layout-minimal .form-btn--save { background: #FFFFFF; color: var(--active-bg); }

    .task-summary {
      text-align: center; padding: 14px 0 4px; font-size: 0.82rem;
      color: rgba(255,255,255,0.55); border-top: 1px solid rgba(255,255,255,0.12); margin-top: 14px;
    }
    body.layout-minimal .task-summary {
      padding: 12px 0; font-size: 0.85rem;
      color: rgba(255,255,255,0.75); border-top-color: rgba(255,255,255,0.15); margin-top: 12px;
    }

    /* ── Modal (Drawer Style) ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px); z-index: 1000;
      display: flex; align-items: center; justify-content: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.visible { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--bg-base); height: 100%; width: 100%; max-width: 380px;
      box-shadow: -10px 0 40px rgba(0,0,0,0.1);
      transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column; color: var(--text);
      border-left: 1px solid rgba(128,128,128,0.15);
    }
    .overlay.visible .modal { transform: translateX(0); }

    .modal__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid rgba(128,128,128,0.15);
    }
    .modal__head h2 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .modal__x {
      border: none; background: transparent; color: var(--text-sec); font-size: 1.1rem; cursor: pointer;
    }

    .modal__body { padding: 20px 24px; overflow-y: auto; flex: 1; }

    .sgroup { margin-bottom: 24px; }
    .sgroup__title {
      font-size: 0.72rem; font-weight: 600; color: var(--text-sec);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
    }
    .srow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .srow label { font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .srow input[type="number"] {
      width: 55px; padding: 5px 6px; border: 1.5px solid rgba(128,128,128,0.2); border-radius: 4px;
      font-family: var(--font); font-size: 0.8rem; font-weight: 600;
      color: var(--text); text-align: center; outline: none; background: transparent;
    }
    .srow input[type="number"]:focus { border-color: var(--accent); }
    .srow input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

    /* ── Theme Picker in Modal ── */
    .theme-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px;
    }
    .theme-card {
      border: 1.5px solid rgba(128,128,128,0.15); border-radius: 8px; padding: 8px 4px;
      text-align: center; cursor: pointer; transition: all 0.2s; background: transparent;
      position: relative;
    }
    .theme-card:hover { border-color: rgba(128,128,128,0.3); }
    .theme-card.active { border-color: var(--accent); }
    .theme-card__preview {
      display: flex; gap: 3px; justify-content: center; margin-bottom: 4px;
    }
    .theme-card__dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .theme-card__name { font-size: 0.65rem; font-weight: 500; color: var(--text); }
    .theme-card__del {
      position: absolute; top: -4px; right: -4px;
      width: 14px; height: 14px; border: none; border-radius: 50%;
      background: #E74C3C; color: #fff; font-size: 0.55rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .import-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
    .import-btn {
      padding: 6px 12px; border: 1.5px solid rgba(128,128,128,0.2); border-radius: 4px;
      background: transparent; color: var(--text); font-family: var(--font);
      font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .import-btn:hover { background: rgba(128,128,128,0.06); }

    #themeFileInput { display: none; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #FFFFFF; color: #121212;
      padding: 10px 18px; border-radius: 30px; font-size: 0.8rem; font-weight: 500;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 2000;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast.visible { transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    .footer {
      text-align: center; padding: 28px 20px;
      font-size: 0.8rem; color: rgba(255,255,255,0.45);
    }
    .footer a { color: #FFFFFF; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }

    .empty-state { text-align: center; padding: 24px 0; color: rgba(255,255,255,0.6); font-size: 0.9rem; }

    .modal__foot {
      padding: 14px 24px; border-top: 1px solid rgba(128,128,128,0.15); display: flex; justify-content: flex-end;
    }
    .modal__ok {
      padding: 8px 24px; border: none; border-radius: 4px;
      background: var(--accent); color: var(--bg-base); font-family: var(--font);
      font-size: 0.8rem; font-weight: 600; cursor: pointer; width: 100%;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .header { padding: 12px 16px; }
      body.layout-minimal .header { padding: 16px 16px 8px; }
      .container { padding: 0 16px; }
    }

    @media (max-width: 540px) {
      .timer-display { font-size: 5.2rem; letter-spacing: 2px; margin: 10px 0 20px; }
      .start-btn { padding: 11px 40px; font-size: 1.15rem; }
      .mode-tab { font-size: 0.85rem; padding: 4px 10px; }
      body.layout-minimal .timer-display { font-size: 8rem; letter-spacing: -4px; margin: 10px 0 25px; }
      body.layout-minimal .start-btn { padding: 14px 60px; font-size: 1.15rem; letter-spacing: 4px; }
      body.layout-minimal .mode-tab { font-size: 1.05rem; }
      body.layout-minimal .mode-tabs { gap: 20px; margin-bottom: 25px; }
      body.layout-minimal .session-counter { margin-bottom: 30px; }
    }

    @media (max-width: 400px) {
      .timer-display { font-size: 4.4rem; letter-spacing: 1px; }
      .mode-tabs { gap: 2px; }
      .mode-tab { font-size: 0.8rem; padding: 4px 6px; }
      body.layout-minimal .timer-display { font-size: 6.2rem; letter-spacing: -3px; margin: 8px 0 20px; }
      body.layout-minimal .mode-tabs { gap: 14px; margin-bottom: 20px; }
      body.layout-minimal .mode-tab { font-size: 0.95rem; }
      body.layout-minimal .start-btn { padding: 12px 48px; font-size: 1.05rem; letter-spacing: 3px; }
      body.layout-minimal .session-counter { margin-bottom: 24px; }
    }

    @media (max-width: 440px) {
      .modal { max-width: 100%; border-left: none; }
      .modal__head { padding: 16px 20px; }
      .modal__body { padding: 16px 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
  <div class="toast" id="toast"></div>
  <input type="file" id="themeFileInput" accept=".json">

  <!-- Header -->
  <header class="header">
    <div class="header__logo"></div>
    <div class="header__actions">
      <button class="btn-icon" onclick="toggleLayout()" id="layoutToggleBtn" title="Switch Layout"></button>
      <button class="btn-icon" onclick="openSettings()" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Timer -->
  <div class="container">
    <div class="timer-card">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="pomodoro" onclick="switchMode('pomodoro')">Focus</button>
        <button class="mode-tab" data-mode="shortBreak" onclick="switchMode('shortBreak')">Short</button>
        <button class="mode-tab" data-mode="longBreak" onclick="switchMode('longBreak')">Long</button>
      </div>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <button class="start-btn" id="startBtn" onclick="toggleTimer()">START</button>
    </div>

    <div class="session-info" id="sessionInfo">Time to focus!</div>
    <div class="session-counter" id="sessionCounter">#1</div>

    <!-- Tasks -->
    <div class="tasks-header">
      <span class="tasks-header__title">Tasks</span>
      <button class="tasks-hdr-btn" onclick="clearDone()" title="Clear completed">Clear Done</button>
    </div>
    <ul class="task-list" id="taskList"></ul>

    <div class="add-form" id="addForm">
      <div class="add-form__body">
        <input type="text" class="add-form__input" id="taskInput" placeholder="What are you working on?" maxlength="120" onkeydown="if(event.key==='Enter')saveTask()">
        <div class="add-form__row">
          <span class="add-form__label">Est Sessions</span>
          <div class="stepper">
            <button class="stepper-btn" onclick="stepPomos(-1)">−</button>
            <span class="stepper-val" id="pomoStep">1</span>
            <button class="stepper-btn" onclick="stepPomos(1)">+</button>
          </div>
        </div>
      </div>
      <div class="add-form__footer">
        <button class="form-btn form-btn--cancel" onclick="closeForm()">Cancel</button>
        <button class="form-btn form-btn--save" onclick="saveTask()">Save</button>
      </div>
    </div>
    <button class="add-btn" id="addBtn" onclick="openForm()">＋ Add Task</button>
    <div class="task-summary" id="taskSummary"></div>
  </div>

  <div class="footer">
    <p>🍅 TomaFocus — Aesthetic Focus Timer</p>
  </div>

  <!-- Settings Drawer -->
  <div class="overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
    <div class="modal">
      <div class="modal__head">
        <h2>Preferences</h2>
        <button class="modal__x" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal__body">

        <!-- Theme Section -->
        <div class="sgroup">
          <div class="sgroup__title">🎨 Color Theme</div>
          <div class="theme-grid" id="themeGrid"></div>
          <div class="import-row">
            <button class="import-btn" onclick="document.getElementById('themeFileInput').click()">📂 Import</button>
            <button class="import-btn" onclick="exportTheme()">💾 Export</button>
          </div>
        </div>

        <!-- Timer Section -->
        <div class="sgroup">
          <div class="sgroup__title">⏱ Interval (minutes)</div>
          <div class="srow"><label>Focus</label><input type="number" id="sPomo" min="1" max="120" value="25"></div>
          <div class="srow"><label>Short Break</label><input type="number" id="sShort" min="1" max="60" value="5"></div>
          <div class="srow"><label>Long Break</label><input type="number" id="sLong" min="1" max="60" value="15"></div>
        </div>

        <div class="sgroup">
          <div class="sgroup__title">⚙ Auto Start</div>
          <div class="srow"><label>Auto Start Breaks</label><input type="checkbox" id="sAutoBreak"></div>
          <div class="srow"><label>Auto Start Focus</label><input type="checkbox" id="sAutoPomo"></div>
        </div>

        <div class="sgroup">
          <div class="sgroup__title">🔄 Long Break Cycle</div>
          <div class="srow"><label>Every X sessions</label><input type="number" id="sInterval" min="1" max="10" value="4"></div>
        </div>

        <div id="modalSwitchLinkContainer" style="margin-top: 30px; text-align: center; border-top: 1px solid rgba(128,128,128,0.15); padding-top: 20px; padding-bottom: 10px;">
          <a href="#" onclick="event.preventDefault(); toggleLayout();" style="color: var(--accent); font-size: 0.85rem; font-weight: 600; text-decoration: none;">Switch to Classic View</a>
        </div>
      </div>
      <div class="modal__foot">
        <button class="modal__ok" onclick="saveSettings()">Save Preferences</button>
      </div>
    </div>
  </div>

  <script>
  // ══════════════════════════════════════════════════
  // BUILT-IN THEMES
  // ══════════════════════════════════════════════════
  const BUILTIN_THEMES = {
    terracotta: {
      name: "Terracotta", author: "TomaFocus", version: "1.0",
      colors: {
        pomodoro:   { bg: "#C27054", dark: "#A5573C", hover: "#D5846B" },
        shortBreak: { bg: "#6B8E83", dark: "#547369", hover: "#82A79C" },
        longBreak:  { bg: "#557A95", dark: "#3F5E74", hover: "#6C96B2" },
        card: "rgba(255,255,255,0.12)", button: "#FFFFFF", buttonText: "#C27054",
        text: "#5E5654", textSecondary: "#8A7E7B",
        taskBg: "#FAF6F5", taskText: "#3E3735", accent: "#C27054"
      },
      font: "Outfit", timerFont: "Space Mono", borderRadius: "16px"
    },
    dark: {
      name: "Slate Night", author: "TomaFocus", version: "1.0",
      colors: {
        pomodoro:   { bg: "#2D2D2D", dark: "#1A1A1A", hover: "#3D3D3D" },
        shortBreak: { bg: "#1E3A2F", dark: "#142A21", hover: "#2A4E3F" },
        longBreak:  { bg: "#1E2A3A", dark: "#141E2A", hover: "#2A3A4E" },
        card: "rgba(255,255,255,0.02)", button: "#E0E0E0", buttonText: "#121212",
        text: "#B0B0B0", textSecondary: "#707070",
        taskBg: "#181818", taskText: "#E0E0E0", accent: "#81E6D9"
      },
      font: "Outfit", timerFont: "Space Mono", borderRadius: "16px"
    }
  };

  // ══════════════════════════════════════════════════
  // STATE
  // ══════════════════════════════════════════════════
  let S = {
    mode: 'pomodoro', running: false, secondsLeft: 25 * 60,
    pomoCount: 0, activeTaskId: null, tasks: [],
    settings: { pomodoro: 25, shortBreak: 5, longBreak: 15, interval: 4, autoBreak: false, autoPomo: false },
    themeId: 'dark',
    customThemes: {},
    layout: 'classic'
  };
  let interval = null, newPomos = 1;

  // ══════════════════════════════════════════════════
  // PERSISTENCE
  // ══════════════════════════════════════════════════
  function load() {
    try {
      const d = JSON.parse(localStorage.getItem('tomafocus1'));
      if (d) {
        S.tasks = d.tasks || [];
        S.pomoCount = d.pomoCount || 0;
        S.activeTaskId = d.activeTaskId || null;
        if (d.settings) S.settings = { ...S.settings, ...d.settings };
        if (d.themeId) S.themeId = d.themeId;
        if (d.customThemes) S.customThemes = d.customThemes;
        S.layout = d.layout || 'classic';
      }
    } catch (e) {}
    S.secondsLeft = S.settings.pomodoro * 60;
  }

  function save() {
    try {
      localStorage.setItem('tomafocus1', JSON.stringify({
        tasks: S.tasks, pomoCount: S.pomoCount, activeTaskId: S.activeTaskId,
        settings: S.settings, themeId: S.themeId, customThemes: S.customThemes,
        layout: S.layout
      }));
    } catch (e) {}
  }

  // ══════════════════════════════════════════════════
  // THEME ENGINE
  // ══════════════════════════════════════════════════
  function getAllThemes() {
    return { ...BUILTIN_THEMES, ...S.customThemes };
  }

  function getTheme(id) {
    return getAllThemes()[id] || BUILTIN_THEMES.dark;
  }

  function applyTheme(themeId) {
    S.themeId = themeId;
    const t = getTheme(themeId);
    const c = t.colors;
    const r = document.documentElement.style;

    r.setProperty('--pomo-bg', c.pomodoro.bg);
    r.setProperty('--pomo-dark', c.pomodoro.dark);
    r.setProperty('--pomo-hover', c.pomodoro.hover);
    r.setProperty('--short-bg', c.shortBreak.bg);
    r.setProperty('--short-dark', c.shortBreak.dark);
    r.setProperty('--short-hover', c.shortBreak.hover);
    r.setProperty('--long-bg', c.longBreak.bg);
    r.setProperty('--long-dark', c.longBreak.dark);
    r.setProperty('--long-hover', c.longBreak.hover);

    r.setProperty('--card-bg', c.card);
    r.setProperty('--btn-bg', c.button);
    r.setProperty('--btn-text', c.buttonText);
    r.setProperty('--text', c.text);
    r.setProperty('--text-sec', c.textSecondary);
    r.setProperty('--task-bg', c.taskBg);
    r.setProperty('--task-text', c.taskText);
    r.setProperty('--accent', c.accent);

    const isThemeDark = c.taskBg.includes('#1') || c.taskBg.includes('#2') || c.taskBg === '#181818' || c.taskBg === '#1E1E1E';
    r.setProperty('--bg-base', isThemeDark ? '#121212' : '#FFFFFF');

    if (t.font) r.setProperty('--font', `'${t.font}', sans-serif`);
    if (t.timerFont) r.setProperty('--timer-font', `'${t.timerFont}', monospace`);
    if (t.borderRadius) r.setProperty('--radius', t.borderRadius);

    setActiveColors(S.mode);
    save();
  }

  function setActiveColors(mode) {
    const t = getTheme(S.themeId);
    const modeColors = t.colors[mode] || t.colors.pomodoro;

    document.body.style.backgroundColor = modeColors.bg;
    document.documentElement.style.setProperty('--active-bg', modeColors.bg);
    document.documentElement.style.setProperty('--active-dark', modeColors.dark);
    document.documentElement.style.setProperty('--active-hover', modeColors.hover);
    document.documentElement.style.setProperty('--accent', modeColors.bg);

    const pb = document.getElementById('progressBar');
    if (pb) pb.style.background = '#FFFFFF';

    const btn = document.querySelector('.start-btn');
    if (btn) {
      if (S.layout === 'minimal') {
        btn.style.borderColor = '#FFFFFF';
        btn.style.color = '#FFFFFF';
        btn.style.background = 'transparent';
      } else {
        btn.style.borderColor = 'transparent';
        btn.style.color = modeColors.bg;
        btn.style.background = '#FFFFFF';
      }
    }
  }

  // ══════════════════════════════════════════════════
  // THEME UI
  // ══════════════════════════════════════════════════
  function renderThemeGrid() {
    const grid = document.getElementById('themeGrid');
    const all = getAllThemes();
    grid.innerHTML = Object.entries(all).map(([id, t]) => {
      const c = t.colors;
      const isBuiltin = BUILTIN_THEMES.hasOwnProperty(id);
      const deleteBtn = isBuiltin ? '' : `<button class="theme-card__del" onclick="event.stopPropagation(); deleteTheme('${id}')" title="Delete Theme">✕</button>`;
      return `
        <div class="theme-card ${S.themeId === id ? 'active' : ''}" onclick="selectTheme('${id}')">
          ${deleteBtn}
          <div class="theme-card__preview">
            <div class="theme-card__dot" style="background:${c.pomodoro.bg}"></div>
            <div class="theme-card__dot" style="background:${c.shortBreak.bg}"></div>
            <div class="theme-card__dot" style="background:${c.longBreak.bg}"></div>
          </div>
          <div class="theme-card__name">${esc(t.name)}</div>
        </div>
      `;
    }).join('');
  }

  function selectTheme(id) {
    applyTheme(id);
    renderThemeGrid();
  }

  function deleteTheme(id) {
    if (BUILTIN_THEMES.hasOwnProperty(id)) return;
    const t = getTheme(id);
    if (confirm(`Delete theme "${t.name}"?`)) {
      delete S.customThemes[id];
      if (S.themeId === id) applyTheme('dark');
      renderThemeGrid();
      save();
      toast('✓ Theme deleted');
    }
  }

  function exportTheme() {
    const t = getTheme(S.themeId);
    const blob = new Blob([JSON.stringify(t, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${S.themeId}-theme.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('💾 Theme exported');
  }

  document.getElementById('themeFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const t = JSON.parse(ev.target.result);
        if (!t.name || !t.colors || !t.colors.pomodoro || !t.colors.shortBreak || !t.colors.longBreak) {
          toast('❌ Invalid theme structure.'); return;
        }
        t.font = t.font || 'Outfit';
        t.timerFont = t.timerFont || 'Space Mono';
        t.borderRadius = t.borderRadius || '16px';
        const id = t.name.toLowerCase().replace(/[^a-z0-9]/g, '_');
        S.customThemes[id] = t;
        applyTheme(id);
        renderThemeGrid();
        save();
        toast(`✓ Imported: ${t.name}`);
      } catch (err) {
        toast('❌ Parse error: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ══════════════════════════════════════════════════
  // LAYOUT ENGINE
  // ══════════════════════════════════════════════════
  function toggleLayout() {
    S.layout = S.layout === 'minimal' ? 'classic' : 'minimal';
    applyLayout();
    save();
  }

  function applyLayout() {
    const isMinimal = S.layout === 'minimal';
    document.body.classList.toggle('layout-minimal', isMinimal);

    const toggleBtn = document.getElementById('layoutToggleBtn');
    if (toggleBtn) {
      toggleBtn.innerHTML = isMinimal
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg> Classic`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:4px;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg> Zen`;
      toggleBtn.title = isMinimal ? "Switch to Classic View" : "Switch to Zen View";
    }

    const logo = document.querySelector('.header__logo');
    if (logo) {
      logo.innerHTML = isMinimal
        ? '●'
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px;display:inline-block;vertical-align:middle;margin-right:6px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>TomaFocus</span>`;
    }

    const footer = document.querySelector('.footer');
    if (footer) footer.style.display = isMinimal ? 'none' : 'block';

    const switchLinkContainer = document.getElementById('modalSwitchLinkContainer');
    if (switchLinkContainer) switchLinkContainer.style.display = isMinimal ? 'block' : 'none';

    setActiveColors(S.mode);
    updateTabs();
    updateInfo();
    renderTasks();
  }

  // ══════════════════════════════════════════════════
  // TIMER
  // ══════════════════════════════════════════════════
  function switchMode(mode) {
    if (S.running && !confirm('Timer is running. Switch anyway?')) return;
    stopTimer();
    S.mode = mode;
    S.secondsLeft = S.settings[mode === 'pomodoro' ? 'pomodoro' : mode === 'shortBreak' ? 'shortBreak' : 'longBreak'] * 60;
    setActiveColors(mode);
    updateDisplay(); updateTabs(); updateInfo(); updateTitle(); updateProgressBar();
  }

  function updateTabs() {
    const isMinimal = S.layout === 'minimal';
    document.querySelectorAll('.mode-tab').forEach(t => {
      const mode = t.dataset.mode;
      t.classList.toggle('active', mode === S.mode);
      if (mode === 'pomodoro') t.textContent = 'Focus';
      else if (mode === 'shortBreak') t.textContent = isMinimal ? 'Short' : 'Short Break';
      else if (mode === 'longBreak') t.textContent = isMinimal ? 'Long' : 'Long Break';
    });
  }

  function toggleTimer() { S.running ? stopTimer() : startTimer(); }

  function startTimer() {
    S.running = true;
    document.body.classList.add('timer-running');
    document.getElementById('startBtn').textContent = 'PAUSE';
    interval = setInterval(tick, 1000);
  }

  function stopTimer() {
    S.running = false;
    document.body.classList.remove('timer-running');
    document.getElementById('startBtn').textContent = 'START';
    clearInterval(interval); interval = null; updateTitle();
  }

  function tick() {
    S.secondsLeft--;
    updateProgressBar();
    if (S.secondsLeft < 0) { clearInterval(interval); interval = null; S.running = false; onComplete(); return; }
    updateDisplay(); updateTitle();
  }

  function updateProgressBar() {
    const total = S.settings[S.mode === 'pomodoro' ? 'pomodoro' : S.mode === 'shortBreak' ? 'shortBreak' : 'longBreak'] * 60;
    const elapsed = total - S.secondsLeft;
    document.getElementById('progressBar').style.width = Math.min(100, Math.max(0, (elapsed / total) * 100)) + '%';
  }

  function onComplete() {
    playAlarm();
    document.body.classList.remove('timer-running');
    if (S.mode === 'pomodoro') {
      S.pomoCount++;
      const task = S.tasks.find(t => t.id === S.activeTaskId);
      if (task) task.actPomos++;
      save(); renderTasks();
      toast('🍅 Focus Session Complete!');
      S.pomoCount % S.settings.interval === 0 ? switchMode('longBreak') : switchMode('shortBreak');
      if (S.settings.autoBreak) setTimeout(startTimer, 400);
    } else {
      toast('☕ Break over! Focus.');
      switchMode('pomodoro');
      if (S.settings.autoPomo) setTimeout(startTimer, 400);
    }
    updateInfo();
    document.getElementById('startBtn').textContent = 'START';
  }

  function updateDisplay() {
    const m = Math.floor(S.secondsLeft / 60), s = S.secondsLeft % 60;
    document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function updateTitle() {
    const m = Math.floor(S.secondsLeft / 60), s = S.secondsLeft % 60;
    const t = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const l = { pomodoro: 'Focus', shortBreak: 'Break', longBreak: 'Long Break' };
    document.title = `${t} - ${l[S.mode]} | TomaFocus`;
  }

  function updateInfo() {
    const isMinimal = S.layout === 'minimal';
    const infoEl = document.getElementById('sessionInfo');
    if (infoEl) {
      infoEl.style.display = isMinimal ? 'none' : 'block';
      infoEl.textContent = S.mode === 'pomodoro' ? 'Time to focus!' : 'Break!';
    }
    const counterEl = document.getElementById('sessionCounter');
    if (counterEl) {
      counterEl.textContent = isMinimal
        ? `#${S.pomoCount + 1}`
        : `#${S.pomoCount + 1} — ${S.pomoCount} done`;
    }
  }

  function playAlarm() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [830, 830, 830, 660].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.25);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + 0.22);
        o.start(ctx.currentTime + i * 0.25); o.stop(ctx.currentTime + i * 0.25 + 0.25);
      });
    } catch (e) {}
    if (Notification.permission === 'granted') {
      new Notification('TomaFocus', { body: S.mode === 'pomodoro' ? '🍅 Focus session complete!' : '☕ Break is over!' });
    }
  }

  // ══════════════════════════════════════════════════
  // TASKS
  // ══════════════════════════════════════════════════
  let nextId = 1;

  function renderTasks() {
    const el = document.getElementById('taskList');
    const isMinimal = S.layout === 'minimal';
    if (!S.tasks.length) {
      el.innerHTML = isMinimal ? '' : '<div class="empty-state">No tasks. Click below to add.</div>';
      updateSummary();
      return;
    }
    el.innerHTML = S.tasks.map(t => {
      const pomoText = isMinimal ? `${t.actPomos}/${t.estPomos}` : `${t.actPomos} / ${t.estPomos} sessions`;
      return `
        <li class="task-item ${t.done ? 'completed' : ''} ${t.id === S.activeTaskId ? 'active-task' : ''}" onclick="selectTask(${t.id})">
          <button class="task-check" onclick="event.stopPropagation();toggleDone(${t.id})">${t.done ? '✓' : ''}</button>
          <div class="task-content">
            <div class="task-name">${esc(t.name)}</div>
            <div class="task-pomos">${pomoText}</div>
          </div>
          <button class="task-del" onclick="event.stopPropagation();delTask(${t.id})">✕</button>
        </li>
      `;
    }).join('');
    updateSummary();
  }

  function selectTask(id) { S.activeTaskId = S.activeTaskId === id ? null : id; save(); renderTasks(); }
  function toggleDone(id) { const t = S.tasks.find(x => x.id === id); if (t) { t.done = !t.done; save(); renderTasks(); } }
  function delTask(id) { S.tasks = S.tasks.filter(x => x.id !== id); if (S.activeTaskId === id) S.activeTaskId = null; save(); renderTasks(); }
  function clearDone() {
    const n = S.tasks.filter(t => t.done).length;
    if (!n) { toast('No completed tasks.'); return; }
    if (!confirm(`Remove ${n} completed task(s)?`)) return;
    S.tasks = S.tasks.filter(t => !t.done); save(); renderTasks(); toast(`🗑 Cleared ${n} task(s)`);
  }

  function openForm() { document.getElementById('addForm').classList.add('visible'); document.getElementById('addBtn').style.display = 'none'; document.getElementById('taskInput').focus(); newPomos = 1; document.getElementById('pomoStep').textContent = '1'; }
  function closeForm() { document.getElementById('addForm').classList.remove('visible'); document.getElementById('addBtn').style.display = ''; document.getElementById('taskInput').value = ''; newPomos = 1; document.getElementById('pomoStep').textContent = '1'; }
  function stepPomos(d) { newPomos = Math.max(1, Math.min(20, newPomos + d)); document.getElementById('pomoStep').textContent = newPomos; }
  function saveTask() {
    const inp = document.getElementById('taskInput'), name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    S.tasks.push({ id: nextId++, name, estPomos: newPomos, actPomos: 0, done: false });
    save(); renderTasks(); closeForm(); toast(`✓ Added: ${name}`);
  }

  function updateSummary() {
    const total = S.tasks.length, done = S.tasks.filter(t => t.done).length;
    const estSum = S.tasks.reduce((s, t) => s + t.estPomos, 0), actSum = S.tasks.reduce((s, t) => s + t.actPomos, 0);
    const left = (estSum - actSum) * S.settings.pomodoro;
    const isMinimal = S.layout === 'minimal';
    let fin = '';
    if (left > 0) {
      const d = new Date(); d.setMinutes(d.getMinutes() + left);
      const h = d.getHours() % 12 || 12, m = String(d.getMinutes()).padStart(2, '0'), ap = d.getHours() >= 12 ? 'PM' : 'AM';
      fin = isMinimal ? ` · Finish: ${h}:${m} ${ap}` : ` · Finish at ${h}:${m} ${ap}`;
    }
    if (total === 0) {
      document.getElementById('taskSummary').textContent = '';
    } else {
      document.getElementById('taskSummary').textContent = isMinimal
        ? `${done}/${total} done · ${left}m left${fin}`
        : `${done}/${total} done · ${actSum}/${estSum} sessions (${left}m left)${fin}`;
    }
  }

  // ══════════════════════════════════════════════════
  // SETTINGS
  // ══════════════════════════════════════════════════
  function openSettings() {
    document.getElementById('sPomo').value = S.settings.pomodoro;
    document.getElementById('sShort').value = S.settings.shortBreak;
    document.getElementById('sLong').value = S.settings.longBreak;
    document.getElementById('sInterval').value = S.settings.interval;
    document.getElementById('sAutoBreak').checked = S.settings.autoBreak;
    document.getElementById('sAutoPomo').checked = S.settings.autoPomo;
    renderThemeGrid();
    document.getElementById('settingsOverlay').classList.add('visible');
  }

  function closeSettings() { document.getElementById('settingsOverlay').classList.remove('visible'); }

  function saveSettings() {
    S.settings.pomodoro = parseInt(document.getElementById('sPomo').value) || 25;
    S.settings.shortBreak = parseInt(document.getElementById('sShort').value) || 5;
    S.settings.longBreak = parseInt(document.getElementById('sLong').value) || 15;
    S.settings.interval = parseInt(document.getElementById('sInterval').value) || 4;
    S.settings.autoBreak = document.getElementById('sAutoBreak').checked;
    S.settings.autoPomo = document.getElementById('sAutoPomo').checked;
    save(); closeSettings();
    if (!S.running) {
      S.secondsLeft = S.settings[S.mode === 'pomodoro' ? 'pomodoro' : S.mode === 'shortBreak' ? 'shortBreak' : 'longBreak'] * 60;
      updateDisplay(); updateTitle();
    }
    toast('✓ Saved');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 2500);
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) { e.preventDefault(); toggleTimer(); }
  });

  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();

  // ══════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════
  load();
  if (S.tasks.length) nextId = Math.max(...S.tasks.map(t => t.id)) + 1;
  applyLayout();
  applyTheme(S.themeId);
  updateDisplay(); updateTitle();

  // Register Service Worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(err => {
      console.log('SW registration failed:', err);
    });
  }
  </script>
</body>
</html>
